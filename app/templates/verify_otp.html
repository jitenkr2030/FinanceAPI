<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Two-Factor Auth — FinanceAPI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    body { font-family: 'Inter', sans-serif; }
    .otp-input { letter-spacing: 0.4em; font-size: 1.5rem; text-align: center; }
  </style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-indigo-50 flex items-center justify-center p-4">
  <div class="w-full max-w-sm">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-14 h-14 bg-indigo-600 rounded-2xl mb-4">
        <svg class="w-8 h-8 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Two-Factor Verification</h1>
      <p class="text-gray-500 mt-1 text-sm">Enter the 6-digit code from your authenticator app.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      {% if error %}
      <div class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6">
        <p class="text-red-700 text-sm">{{ error }}</p>
      </div>
      {% endif %}

      <form method="post" action="/verify-otp" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-3 text-center">Authentication Code</label>
          <input type="text" name="otp_code" required maxlength="6" pattern="\d{6}" placeholder="000000"
            class="otp-input w-full px-4 py-4 border-2 border-gray-200 rounded-xl focus:outline-none focus:border-indigo-500 font-mono"
            autofocus autocomplete="one-time-code"/>
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-colors text-sm">
          Verify & Sign In
        </button>
      </form>
      <div class="mt-5 text-center">
        <a href="/logout" class="text-sm text-gray-400 hover:text-gray-600">Cancel and sign out</a>
      </div>
    </div>
  </div>
</body>
</html>
