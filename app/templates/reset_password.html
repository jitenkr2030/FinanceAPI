<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — FinanceAPI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <style>body { font-family: 'Inter', sans-serif; }</style>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-50 to-indigo-50 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-12 h-12 bg-indigo-600 rounded-2xl mb-4">
        <svg class="w-7 h-7 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 7a2 2 0 012 2m4 0a6 6 0 01-7.743 5.743L11 17H9v2H7v2H4a1 1 0 01-1-1v-2.586a1 1 0 01.293-.707l5.964-5.964A6 6 0 1121 9z"/>
        </svg>
      </div>
      <h1 class="text-2xl font-bold text-gray-900">Set new password</h1>
      <p class="text-gray-500 mt-1 text-sm">Choose a strong password for your account.</p>
    </div>

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-8">
      {% if error %}
      <div class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6">
        <p class="text-red-700 text-sm">{{ error }}</p>
      </div>
      {% endif %}
      {% if invalid %}
      <div class="bg-red-50 border border-red-200 rounded-xl p-5 text-center">
        <p class="text-red-700 font-semibold mb-2">Invalid or expired link</p>
        <p class="text-red-600 text-sm mb-4">This reset link has expired or already been used.</p>
        <a href="/forgot-password" class="text-indigo-600 font-semibold text-sm hover:underline">Request a new one</a>
      </div>
      {% else %}
      <form method="post" class="space-y-5">
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">New Password</label>
          <input type="password" name="password" required minlength="8" placeholder="Minimum 8 characters"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        </div>
        <div>
          <label class="block text-sm font-semibold text-gray-700 mb-1.5">Confirm Password</label>
          <input type="password" name="confirm_password" required minlength="8" placeholder="Repeat password"
            class="w-full px-4 py-3 border border-gray-200 rounded-xl text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
        </div>
        <button type="submit" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-3 rounded-xl transition-colors text-sm">
          Update Password
        </button>
      </form>
      {% endif %}
    </div>
  </div>
</body>
</html>
